services:
  # Tailscale sidecar — joins this machine to your tailnet.
  # No need to install Tailscale on the host; just provide a TS_AUTHKEY.
  tailscale:
    image: tailscale/tailscale:latest
    container_name: vps-agent-tailscale
    hostname: ${NODE_NAME:-vps-agent}     # name shown in your Tailscale admin console
    restart: unless-stopped
    # Map the dashboard's MagicDNS name straight to its Tailscale IP.
    # This avoids relying on in-container MagicDNS (which needs kernel modules
    # that aren't present on many hosts). TLS still validates because the name
    # matches the `tailscale serve` certificate. Shared with vps-agent via
    # network_mode below.
    extra_hosts:
      - "${DASHBOARD_HOST:-dashboard.invalid}:${DASHBOARD_TS_IP:-127.0.0.1}"
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY:?Set TS_AUTHKEY in your .env}
      - TS_STATE_DIR=/var/lib/tailscale    # persist node identity across restarts
      - TS_USERSPACE=false                 # kernel networking so the agent can reach tailnet peers
      - TS_ACCEPT_DNS=false                # we use extra_hosts, not MagicDNS, to reach the dashboard
      - TS_EXTRA_ARGS=--accept-routes
    volumes:
      - ./tailscale-state:/var/lib/tailscale
    devices:
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - NET_ADMIN
      - NET_RAW

  vps-agent:
    build: .
    # Or use the pre-built image:
    # image: ghcr.io/youruser/vps-agent:latest
    container_name: vps-agent
    restart: unless-stopped
    depends_on:
      - tailscale
    network_mode: "service:tailscale"   # share the Tailscale container's network
    pid: "host"                          # gives psutil access to real host metrics
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
    environment:
      # Dashboard URL — use your Tailscale Serve HTTPS hostname (recommended)
      - DASHBOARD_URL=${DASHBOARD_URL:-https://deathstar.tailce94f0.ts.net}

      # Must match the server API_KEY
      - API_KEY=${API_KEY:-changeme}

      # Human-readable name shown in the dashboard
      - NODE_NAME=${NODE_NAME:-my-server-01}

      # How often to report (seconds)
      - REPORT_INTERVAL=${REPORT_INTERVAL:-30}

      # Let psutil read host /proc from the bind-mounted path
      - HOST_PROC=/host/proc
      - HOST_SYS=/host/sys
